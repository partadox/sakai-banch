services:
  nginx:
    image: nginx:alpine
    ports:
      - "8083:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    build: ./docker
    volumes:
      - .:/var/www/html:ro
    restart: unless-stopped
